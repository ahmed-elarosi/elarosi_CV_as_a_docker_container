name: Build & Publish CV Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-and-push:
    name: Build, push, release
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ahmed-elarosi-cv:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ahmed-elarosi-cv:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## Ahmed Elarosi CV — ${{ steps.version.outputs.tag }}

            ### Pull and run
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ahmed-elarosi-cv:${{ steps.version.outputs.version }}

            docker run -d -p 8080:8080 \
              --read-only --tmpfs /tmp \
              ${{ secrets.DOCKERHUB_USERNAME }}/ahmed-elarosi-cv:${{ steps.version.outputs.version }}
            ```
            Then open: http://localhost:8080
          draft: false
          prerelease: false